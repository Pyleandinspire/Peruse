name: longterm_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.5
  intl: ^0.19.0
  file_picker: ^9.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "res/icon.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "res/icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "res/icon.png"
  linux:
    generate: true
    image_path: "res/icon.png"
  web:
    generate: true
    image_path: "res/icon.png"
    background_color: "#0175C2"
    theme_color: "#0175C2"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - res/
